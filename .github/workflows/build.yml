name: Build and Pack Plugin

on:
  push:
    branches:
      - main
  workflow_dispatch: # מאפשר להריץ את הבנייה ידנית מתוך לשונית Actions ב-GitHub

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build project
        run: bun run build

      - name: Pack plugin
        run: bun run scripts/pack-plugin.js

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: plugin-package
          path: '*.zip' # במידה וסקריפט ה-pack-plugin מייצר קובץ zip בתיקייה הראשית
