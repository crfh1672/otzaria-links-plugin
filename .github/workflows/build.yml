name: Build Single HTML & Otzaria Plugin

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build Single HTML Bundle
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci || npm install

      - name: 🔍 Lint & Type Check
        run: npm run lint

      - name: 🏗️ Build Single HTML & .otzplugin
        run: npm run build:otzplugin

      - name: 📤 Upload Build Artifacts (HTML & .otzplugin)
        uses: actions/upload-artifact@v4
        with:
          name: otzaria-links-plugin-dist
          path: |
            dist/index.html
            dist/*.otzplugin
          retention-days: 30

      - name: 🚀 Create GitHub Release on Tag Push
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            dist/index.html
            dist/*.otzplugin
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
